<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✉️</text></svg>">
    
    <title>Новое уведомление</title>
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            background-color: #0b141a;
            font-family: Segoe UI, Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e9edef;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        #alert-box {
            background-color: #1c242f;
            width: 85%;
            max-width: 310px;
            padding: 30px 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            z-index: 10;
        }

        .icon { font-size: 55px; margin-bottom: 15px; }
        .title { font-size: 20px; font-weight: 500; margin-bottom: 10px; color: #e9edef; }
        .text { font-size: 15px; color: #8696a0; margin-bottom: 30px; line-height: 1.4; }

        .btn {
            background-color: #00a884;
            color: #111b21;
            border: none;
            padding: 12px 0;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            font-size: 15px;
            outline: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn:active { background-color: #06cf9c; }

        #loader {
            display: none;
            width: 100%;
            height: 4px;
            background: #2c3942;
            border-radius: 10px;
            margin: 25px 0 10px 0;
            overflow: hidden;
        }

        #progress {
            width: 0%;
            height: 100%;
            background: #00a884;
            transition: width 0.1s linear;
        }

        #status-text { display: none; font-size: 14px; color: #8696a0; margin-top: 8px; }

        #final-screen {
            display: none;
            text-align: center;
            padding: 20px;
            animation: appear 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes appear {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .flowers { font-size: 70px; margin-bottom: 20px; display: block; }
        .wish { font-size: 26px; color: #ff8fa3; font-weight: bold; margin-bottom: 15px; }
        .sub-wish { font-size: 17px; color: #e9edef; line-height: 1.6; }
    </style>
</head>
<body>

    <div id="alert-box">
        <div id="alert-content">
            <div class="icon">✉️</div>
            <div class="title">Личное уведомление</div>
            <div class="text">
                Нажми «Открыть», чтобы прочитать.
            </div>
            <button class="btn" onclick="startFix()">Открыть</button>
        </div>

        <div id="loader"><div id="progress"></div></div>
        <div id="status-text">Загрузка...</div>
    </div>

    <div id="final-screen">
        <span class="flowers" id="wish-emojis">🌸✨🌷</span>
        <div class="wish" id="wish-title">С 8 Марта!</div>
        <div class="sub-wish" id="wish-text"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <script>
        const greetings = [
            {
                title: "С 8 марта!",
                text: "Я решил применить свои знания и собрать эту открытку специально для тебя. Пусть твоя весна будет самой теплой и счастливой!"
            },
            {
                title: "С 8 Марта!",
                text: "Пусть в твоем сердце всегда будет весна, а каждый день радует только хорошими новостями. Спасибо за твою любовь и поддержку!"
            },
            {
                title: "Сияй!",
                text: "Желаю тебе море улыбок, крепкого здоровья и бесконечной радости. <br><br> С праздником!"
            },
            {
                title: "С праздником!",
                text: "Пусть весна начнется с чудес! Желаю тебе яркого солнца, весенней легкости и чтобы ты улыбалась как можно чаще!"
            }
        ];

        const emojiSets = [
            "🌸✨🌷", "💐🌺💖", "🌹✨🦋", "🌷🌼🌸", "🌺🌷💐"
        ];

        function startFix() {
            const randomGreet = greetings[Math.floor(Math.random() * greetings.length)];
            document.getElementById('wish-title').innerText = randomGreet.title;
            document.getElementById('wish-text').innerHTML = randomGreet.text;

            const randomEmojis = emojiSets[Math.floor(Math.random() * emojiSets.length)];
            document.getElementById('wish-emojis').innerText = randomEmojis;

            document.getElementById('alert-content').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            const statusText = document.getElementById('status-text');
            statusText.style.display = 'block';

            let width = 0;
            const progress = document.getElementById('progress');
            
            // Тексты для мамы (более милые)
            const stages = [
                "Загрузка солнечных лучей...",
                "Сборка самых красивых цветов...",
                "Настройка праздничного настроения...",
                "Почти готово..."
            ];

            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    showFinal();
                } else {
                    width += 2;
                    progress.style.width = width + '%';
                    if (width == 20) statusText.innerText = stages[0];
                    if (width == 45) statusText.innerText = stages[1];
                    if (width == 70) statusText.innerText = stages[2];
                    if (width == 90) statusText.innerText = stages[3];
                }
            }, 50);
        }

        function showFinal() {
            document.getElementById('alert-box').style.display = 'none';
            document.body.style.background = 'radial-gradient(circle, #128c7e 0%, #0b141a 100%)';
            document.getElementById('final-screen').style.display = 'block';
            
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#00a884', '#ffffff', '#ff8fa3']
            });
        }
    </script>
</body>
</html>
